name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: ["main", "claude/ai-impact-tracking-tool-YOHsc"]
    paths:
      - "docs/**"
      - "data/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Stage site (docs/ + data/)
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          mkdir -p _site/data
          cp data/*.json _site/data/
          # The dashboard fetches ../data/rules.json relative to docs/index.html.
          # When deployed, index.html lives at the site root, so we mirror data/
          # alongside it and rewrite the fetch paths.
          sed -i 's|"\.\./data/|"data/|g' _site/app.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
